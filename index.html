<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Beat Blocks Ultra</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Beat Blocks Ultra</h1>
            <div class="accuracy-panel">
                <span>Hits: <b id="hit-count">0</b></span>
                <span id="feedback-text">READY</span>
                <span>Acc: <b id="accuracy-pct">0%</b></span>
            </div>
        </header>

        <div class="grid" id="grid"></div>

        <section class="controls">
            <div class="config-row">
                <label>BPM: <input type="number" id="bpm-input" value="100"></label>
                <label>Loops: <input type="number" id="loop-limit" value="4"></label>
                <label>+BPM/Loop: <input type="number" id="bpm-step" value="0"></label>
            </div>

            <div class="main-buttons">
                <button id="play-btn" class="primary">Play</button>
                <button id="mic-btn">Microfone</button>
                <button id="clear-btn">Limpar</button>
            </div>
        </section>

        <!-- NOVA ÁREA DE TAP -->
        <div id="tap-zone" class="tap-zone">
            TAP HERE TO PLAY
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
