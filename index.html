<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Beat Blocks Pro</title>
                <link rel="stylesheet" href="style.css">
                    <link rel="manifest" href="manifest.json">
                    </head>
                    <body>
                        <div class="app-container">
                                <header>
                                            <h1>Beat Blocks Pro</h1>
                                                        <div id="mic-indicator">Microfone: <span>Desligado</span></div>
                                                                </header>

                                                                        <div class="grid" id="grid"></div>

                                                                                <section class="controls">
                                                                                            <div class="config-row">
                                                                                                            <label>BPM: <input type="number" id="bpm-input" value="100" min="40" max="300"></label>
                                                                                                                            <label>Loops: <input type="number" id="loop-limit" value="4" min="1"></label>
                                                                                                                                        </div>

                                                                                                                                                    <div class="config-row">
                                                                                                                                                                    <label>Acelerar BPM/Loop: <input type="number" id="bpm-step" value="0" min="0"></label>
                                                                                                                                                                                </div>

                                                                                                                                                                                            <div class="stats">
                                                                                                                                                                                                            <span>Loop: <b id="current-loop">0</b></span>
                                                                                                                                                                                                                            <span>BPM Atual: <b id="live-bpm">100</b></span>
                                                                                                                                                                                                                                        </div>

                                                                                                                                                                                                                                                    <div class="main-buttons">
                                                                                                                                                                                                                                                                    <button id="play-btn" class="primary">Iniciar Sequência</button>
                                                                                                                                                                                                                                                                                    <button id="mic-btn">Ativar Microfone</button>
                                                                                                                                                                                                                                                                                                </div>
                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                        <div class="editor-actions">
                                                                                                                                                                                                                                                                                                                                        <button id="save-btn">Salvar Ritmo</button>
                                                                                                                                                                                                                                                                                                                                                        <button id="clear-btn">Limpar Tudo</button>
                                                                                                                                                                                                                                                                                                                                                                    </div>
                                                                                                                                                                                                                                                                                                                                                                            </section>
                                                                                                                                                                                                                                                                                                                                                                                </div>
                                                                                                                                                                                                                                                                                                                                                                                    <script src="script.js"></script>
                                                                                                                                                                                                                                                                                                                                                                                    </body>
                                                                                                                                                                                                                                                                                                                                                                                    </html>
